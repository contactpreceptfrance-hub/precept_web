<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precept France | Site en construction</title>
    <meta name="description" content="Bienvenue sur le futur site de Precept France. Notre nouveau site est actuellement en cours de création.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d2b4d; /* Deep blue similar to Precept.org */
            --secondary-color: #e63946; /* Accent color */
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --bg-gradient-start: #0a192f;
            --bg-gradient-end: #020c1b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated background shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 40vw;
            height: 40vw;
            background: rgba(13, 43, 77, 0.5);
            top: -10vw;
            left: -10vw;
        }

        .shape-2 {
            width: 30vw;
            height: 30vw;
            background: rgba(230, 57, 70, 0.15);
            bottom: -5vw;
            right: -10vw;
            animation-delay: -5s;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 1s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-placeholder {
            margin-bottom: 2rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ffffff, #a8b2d1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-color);
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #ffffff, #a8b2d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .divider {
            height: 1px;
            width: 60px;
            background: var(--secondary-color);
            margin: 0 auto 2.5rem auto;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .container:hover .divider {
            width: 100px;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--secondary-color), #c1121f);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
            position: relative;
            overflow: hidden;
        }

        .contact-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s ease;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4);
        }

        .contact-btn:hover::before {
            left: 100%;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="container">
        <div class="logo-placeholder">
            <div class="logo-icon">P</div>
            <span>Precept France</span>
        </div>
        
        <h1>Notre nouveau site arrive bientôt.</h1>
        <div class="divider"></div>
        <p>
            Nous travaillons activement sur une toute nouvelle expérience en ligne pour vous. 
            Découvrez bientôt de nouvelles ressources pour étudier la Bible de manière inductive.
        </p>

        <a href="mailto:contactpreceptfrance@gmail.com" class="contact-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            Nous Contacter
        </a>
    </div>

</body>
</html>
